name: 每日股票分析

on:
  schedule:
    - cron: '0 9 * * 1-5'   # 週一到週五 17:00 台灣時間（09:00 UTC）
  workflow_dispatch:          # 支援手動觸發

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements_analyzer.txt

      - name: Run stock analyzer
        run: python tw_stock_analyzer.py

      - name: Commit and push updated CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --cached --quiet && echo "No changes to commit" || (
            git commit -m "📊 自動更新股票資料 $(date +'%Y-%m-%d')"
            git push
          )
